<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Sudoku</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #333;
        }
        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 {
            margin: 0 0 20px 0;
            color: #4a4a4a;
        }
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 40px);
            grid-template-rows: repeat(9, 40px);
            gap: 1px;
            background: #333;
            padding: 1px;
            margin: 20px auto;
            border: 3px solid #333;
        }
        .cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            background: white;
            cursor: pointer;
            border: 0.5px solid #ddd;
        }
        .cell.fixed {
            color: #1a73e8;
            font-weight: 700;
        }
        .cell.selected {
            background: #e3f2fd;
        }
        .thick-right { border-right: 2px solid #333 !important; }
        .thick-bottom { border-bottom: 2px solid #333 !important; }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }
        button {
            padding: 10px 16px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #4a4a4a;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #333;
        }
        .num-btn {
            width: 40px;
            height: 40px;
        }
        .message {
            margin-top: 15px;
            font-size: 18px;
            min-height: 25px;
        }
        @media (max-width: 500px) {
            .sudoku-grid {
                grid-template-columns: repeat(9, 35px);
                grid-template-rows: repeat(9, 35px);
            }
            .cell { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 Grok Sudoku</h1>
        <div id="grid" class="sudoku-grid"></div>
        
        <div class="controls">
            <button onclick="newGame()">New Game</button>
            <button onclick="eraseCell()">Erase</button>
        </div>
        
        <div class="controls">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
        </div>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        let board = [];
        let solution = [];
        let selectedRow = -1;
        let selectedCol = -1;

        // A simple pre-defined puzzle (medium difficulty)
        const initialPuzzle = [
            [5,3,0,0,7,0,0,0,0],
            [6,0,0,1,9,5,0,0,0],
            [0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3],
            [4,0,0,8,0,3,0,0,1],
            [7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0],
            [0,0,0,4,1,9,0,0,5],
            [0,0,0,0,8,0,0,7,9]
        ];

        function isValid(board, row, col, num) {
            // Check row
            for (let x = 0; x < 9; x++) {
                if (board[row][x] === num) return false;
            }
            // Check column
            for (let x = 0; x < 9; x++) {
                if (board[x][col] === num) return false;
            }
            // Check box
            let startRow = row - row % 3;
            let startCol = col - col % 3;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (board[i + startRow][j + startCol] === num) return false;
                }
            }
            return true;
        }

        function solveSudoku(board) {
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    if (board[row][col] === 0) {
                        for (let num = 1; num <= 9; num++) {
                            if (isValid(board, row, col, num)) {
                                board[row][col] = num;
                                if (solveSudoku(board)) return true;
                                board[row][col] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }

        function generateBoard() {
            board = initialPuzzle.map(row => [...row]);
            solution = initialPuzzle.map(row => [...row]);
            solveSudoku(solution);
        }

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    
                    // Add thick borders for 3x3 blocks
                    if (col % 3 === 2 && col !== 8) cell.classList.add('thick-right');
                    if (row % 3 === 2 && row !== 8) cell.classList.add('thick-bottom');
                    
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    cell.addEventListener('click', () => selectCell(row, col));
                    
                    if (board[row][col] !== 0) {
                        cell.textContent = board[row][col];
                        cell.classList.add('fixed');
                    }
                    
                    grid.appendChild(cell);
                }
            }
        }

        function selectCell(row, col) {
            selectedRow = row;
            selectedCol = col;
            
            // Remove previous selection
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
            
            // Add to new cell
            const cells = document.querySelectorAll('.cell');
            for (let cell of cells) {
                if (parseInt(cell.dataset.row) === row && parseInt(cell.dataset.col) === col) {
                    cell.classList.add('selected');
                    break;
                }
            }
        }

        function inputNumber(num) {
            if (selectedRow === -1 || selectedCol === -1) return;
            
            const cell = document.querySelector(`.cell[data-row="${selectedRow}"][data-col="${selectedCol}"]`);
            if (cell.classList.contains('fixed')) return;
            
            // Check if valid move
            if (!isValid(board, selectedRow, selectedCol, num)) {
                cell.style.background = '#ffebee';
                setTimeout(() => {
                    cell.style.background = 'white';
                }, 300);
                return;
            }
            
            board[selectedRow][selectedCol] = num;
            cell.textContent = num;
            
            if (isSolved()) {
                document.getElementById('message').textContent = '🎉 Congratulations! You solved it!';
                document.getElementById('message').style.color = 'green';
            }
        }

        function eraseCell() {
            if (selectedRow === -1 || selectedCol === -1) return;
            
            const cell = document.querySelector(`.cell[data-row="${selectedRow}"][data-col="${selectedCol}"]`);
            if (cell.classList.contains('fixed')) return;
            
            board[selectedRow][selectedCol] = 0;
            cell.textContent = '';
            document.getElementById('message').textContent = '';
        }

        function isSolved() {
            for (let row = 0; row < 9; row++) {
                for (let col = 0; col < 9; col++) {
                    if (board[row][col] !== solution[row][col]) return false;
                }
            }
            return true;
        }

        function newGame() {
            generateBoard();
            createGrid();
            selectedRow = -1;
            selectedCol = -1;
            document.getElementById('message').textContent = '';
        }

        // Initialize game
        window.onload = () => {
            generateBoard();
            createGrid();
        };
    </script>
</body>
</html>
